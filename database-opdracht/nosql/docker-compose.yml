services:
  web:
    build: .
    ports:
      - "8080:80"
    depends_on:
      - db
    env_file: .env
  db:
    image: mongo:7.0
    restart: always
    env_file: .env
    volumes:
      - db_data:/data/db
  mongo-express:
    image: mongo-express:latest
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: rootwachtwoord
      ME_CONFIG_MONGODB_URL: mongodb://root:rootwachtwoord@db:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    depends_on:
      - db

volumes:
  db_data: